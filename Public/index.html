<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="2">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@700;800;900&display=swap" rel="stylesheet">

  <title>Vovinam Tranh Cúp Cóc Vàng</title>
  <style>
    .body {
      background-image: url("./images/Laptop.jpg");
      background-repeat: no-repeat;
      background-size: auto 100%;
      background-position: center;
      height: 100vh;
      padding: 0;
      margin: 0 auto;
    }

    body {
      background-color: black;
      font-family: 'Raleway';
      /* font-weight: bold; */
      margin: 0 !important;
      color: #FFF !important;
    }
 
    .text {
      font-size: 6vh;
      font-weight: 900;
      letter-spacing: 0.04em;
      line-height: 1.05;
      margin: 0 auto;
      width: 100%;
      text-align: center;
      vertical-align: middle;
      transform: translateY(49vh);
      text-transform: uppercase;
      font-family: "Be Vietnam Pro", "Segoe UI", sans-serif;
      color: rgb(255, 255, 255);
      -webkit-text-fill-color: #ffffff;
      -webkit-text-stroke: 4px #ff8800;
      text-shadow:
         0 4px 0 rgba(183, 126, 0, 0.95),
         0 10px 14px rgba(0, 0, 0, 0.7),
         0 0 8px rgba(240, 184, 0, 0.38)
        }

    #noidung {
      display: inline-block;
      font-weight: 900 !important;
      font-size: 8vh;
      letter-spacing: 0.03em;
      -webkit-text-fill-color: #ffffff;
      -webkit-text-stroke: 3px #ff8800;
      text-shadow:
         0 4px 0 rgba(183, 126, 0, 0.95),
         0 10px 14px rgba(0, 0, 0, 0.7),
         0 0 8px rgba(240, 184, 0, 0.38)
        }

    .text-mid {
      transform: translateY(3vh);
      font-size: 12vh;
      font-weight: 900;
      letter-spacing: 0.03em;
      line-height: 1;
      font-family: "Be Vietnam Pro", "Segoe UI", sans-serif;
      color: rgb(255, 255, 255);
      -webkit-text-fill-color: #ffffff;
      -webkit-text-stroke: 3px #ff0000;
      text-shadow:
         0 4px 0 rgba(183, 126, 0, 0.95),
         0 10px 14px rgba(0, 0, 0, 0.7),
         0 0 8px rgba(240, 184, 0, 0.38)
    }
    .text-bottom {
      transform: translateY(6vh);
      font-size: 7vh;
      -webkit-text-fill-color: #ffffff;
      -webkit-text-stroke: 2px #ff8800;
      text-shadow:
         0 4px 0 rgba(183, 126, 0, 0.95),
         0 10px 14px rgba(0, 0, 0, 0.7),
         0 0 8px rgba(240, 184, 0, 0.38)

    }
    #tongdiem {
      font-size: 14vh;
      font-weight: 900;
      letter-spacing: 0.03em;
      line-height: 1;
      font-family: "Be Vietnam Pro", "Segoe UI", sans-serif;
      color: rgb(255, 255, 255);
      -webkit-text-fill-color: #ffffff;
      -webkit-text-stroke: 4px #ff0000;
      text-shadow:
         0 4px 0 rgba(183, 126, 0, 0.95),
         0 10px 14px rgba(0, 0, 0, 0.7),
         0 0 8px rgba(240, 184, 0, 0.38)
    }

    a {
      color: yellow;
      background-color: transparent;
      text-decoration: none;
      text-shadow: 0px 0px 26px #000000
    }
  </style>
</head>

<body><a href="./suathongtin.html" target="_blank">
  <div class="body">
    <div class="text">
      <div>
        <span id="noidung"></span>
      </div>
      <div class="text-mid">
        <span id="tongdiem"></span>
        điểm
      </div>
      <div class="text-bottom">
        Lớp PC<span id="lop"></span>
      </div>
    </div>
  </div></a>


  <script>

    let noidung = document.getElementById("noidung");
    let localStorageNoiDung = localStorage.getItem("noidung");
    if (localStorageNoiDung) {
      document.getElementsByClassName("text")[0].style.display = "block";
      noidung.innerHTML = localStorageNoiDung;
      let lop = document.getElementById("lop");
      lop.innerHTML = localStorage.getItem("lop");
      let tongdiem = document.getElementById("tongdiem");
      tongdiem.innerHTML = localStorage.getItem("tongdiem");
    } else {
      document.getElementsByClassName("text")[0].style.display = "none";
    }

  </script>
</body>

</html>
